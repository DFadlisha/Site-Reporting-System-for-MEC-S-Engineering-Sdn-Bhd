<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#fe6f6f" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SPRS">
    <meta name="description" content="Site Progress Reporting System – MEC's Engineering Sdn. Bhd." />
    <title>SPRS | MEC's Engineering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.ico" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('%PUBLIC_URL%/sw.js').then(function(registration) {
            console.log('PWA ServiceWorker registration successful with scope: ', registration.scope);
          }, function(err) {
            console.log('PWA ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
